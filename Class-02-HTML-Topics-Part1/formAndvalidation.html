<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forms and Validation</title>
</head>

<body>

    <h2>Student Admission Form</h2>

    <form action="/submit-data" method="POST">

        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" required placeholder="Enter your name">
        <br><br>

        <label for="userEmail">Email Address:</label>
        <input type="email" id="userEmail" name="userEmail" required placeholder="example@mail.com">
        <br><br>

        <label for="userAge">Age (18-25):</label>
        <input type="number" id="userAge" name="userAge" min="18" max="25" required>
        <br><br>

        <button type="submit">Submit Form</button>

    </form>

</body>

</html>
