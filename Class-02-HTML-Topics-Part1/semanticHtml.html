<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Semantic HTML Layout</title>
</head>

<body>

    <header>
        <h1>My Learning Blog</h1>
        <nav>
            <a href="#">Home</a> | <a href="#">Blogs</a> | <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <article>
            <h2>Why Semantic HTML?</h2>
            <p>Semantic tags clearly describe their meaning to both the browser and the developer (e.g., article,
                section, aside).</p>
        </article>

        <aside>
            <h4>Quick Links</h4>
            <p>Check out our HTML tutorials!</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 Batch 1. Built with Semantic HTML.</p>
    </footer>

</body>

</html>
