<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Images and Links</title>
</head>

<body>

    <h2>Working with Links and Images</h2>

    <h3>1. External Link</h3>
    <p>Click here to learn more: <a href="https://www.w3schools.com" target="_blank">Visit W3Schools</a></p>

    <br>

    <h3>2. Displaying an Image</h3>
    <img src="https://car-dealer-r7.web.app/assets/ferrari-Z8RavKWx.png" alt="Sample Display Placeholder" width="500"
        height="400">

    <br><br>

    <h3>3. Image as a Clickable Link</h3>
    <a href="https://car-dealer-r7.web.app/" target="_blank">
        <img src="https://car-dealer-r7.web.app/assets/ferrari-Z8RavKWx.png" alt="Clickable GitHub Logo" width="400"
            height="300">
    </a>

</body>

</html>
