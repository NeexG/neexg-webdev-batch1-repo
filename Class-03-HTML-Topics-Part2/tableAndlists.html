<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tables and Lists</title>
</head>

<body>

    <h2>Unordered List (Bullet Points)</h2>
    <ul>
        <li>HTML5 Basics</li>
        <li>CSS3 Styling</li>
        <li>JavaScript Fundamentals</li>
    </ul>

    <h2>Ordered List (Numbered List)</h2>
    <ol>
        <li>Create an HTML file</li>
        <li>Open it in a Browser</li>
        <li>Write your code</li>
    </ol>

    <hr>

    <h2>HTML Data Table</h2>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Student Name</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>01</td>
                <td>Arif Islam</td>
                <td>Web Development</td>
            </tr>
            <tr>
                <td>02</td>
                <td>Jerin Akter</td>
                <td>Web Development</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
